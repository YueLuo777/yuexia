version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: yuexia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yuexia
    ports:
      - "5432:5432"
    volumes:
      - ./数据库:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 可选：如果需要同时启动后端服务
  # app:
  #   build: .
  #   ports:
  #     - "3000:3000"
