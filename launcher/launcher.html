<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月下写作 - 启动中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    .logo svg { width: 40px; height: 40px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .status-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px 32px;
      max-width: 480px;
      margin: 0 auto;
    }
    .status-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .status-item:last-child { border-bottom: none; }
    .status-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .status-icon.waiting { color: rgba(255,255,255,0.3); }
    .status-icon.loading { color: #667eea; animation: spin 1s linear infinite; }
    .status-icon.success { color: #4ade80; }
    .status-icon.error { color: #f87171; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .status-text {
      flex: 1;
      text-align: left;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
    }
    .status-detail {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      transition: width 0.5s ease;
      width: 0%;
    }
    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
    .error-box {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      display: none;
    }
    .error-box.show { display: block; }
    .error-box pre {
      text-align: left;
      font-size: 12px;
      color: #f87171;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </div>
    <h1>月下写作</h1>
    <p class="subtitle">AI 辅助小说创作工具</p>

    <div class="status-box">
      <div class="status-item" id="step-deps">
        <svg class="status-icon waiting" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <div>
          <div class="status-text">检查依赖</div>
          <div class="status-detail">验证 node_modules 是否存在</div>
        </div>
      </div>
      <div class="status-item" id="step-db">
        <svg class="status-icon waiting" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <div>
          <div class="status-text">初始化数据库</div>
          <div class="status-detail">SQLite 本地数据文件</div>
        </div>
      </div>
      <div class="status-item" id="step-backend">
        <svg class="status-icon waiting" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <div>
          <div class="status-text">启动后端服务</div>
          <div class="status-detail">Hono API Server</div>
        </div>
      </div>
      <div class="status-item" id="step-frontend">
        <svg class="status-icon waiting" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <div>
          <div class="status-text">启动前端服务</div>
          <div class="status-detail">静态文件服务器</div>
        </div>
      </div>
      <div class="status-item" id="step-browser">
        <svg class="status-icon waiting" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        <div>
          <div class="status-text">打开浏览器</div>
          <div class="status-detail">自动跳转到应用</div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>

      <div class="error-box" id="error-box">
        <pre id="error-text"></pre>
      </div>
    </div>

    <p class="footer">月下写作 v1.0.0 | 本地版</p>
  </div>

  <script>
    const steps = ['deps', 'db', 'backend', 'frontend', 'browser'];
    let currentStep = 0;

    function setStep(name, state, detail) {
      const el = document.getElementById('step-' + name);
      const icon = el.querySelector('.status-icon');
      const text = el.querySelector('.status-text');
      const detailEl = el.querySelector('.status-detail');

      icon.className = 'status-icon ' + state;

      if (state === 'loading') {
        icon.innerHTML = '<path d="M21 12a9 9 0 1 1-6.219-8.56"/>';
      } else if (state === 'success') {
        icon.innerHTML = '<polyline points="20 6 9 17 4 12"/>';
      } else if (state === 'error') {
        icon.innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
      }

      if (detail) detailEl.textContent = detail;

      // 更新进度条
      const progress = ((steps.indexOf(name) + (state === 'success' ? 1 : 0)) / steps.length) * 100;
      document.getElementById('progress').style.width = progress + '%';
    }

    function showError(msg) {
      document.getElementById('error-box').classList.add('show');
      document.getElementById('error-text').textContent = msg;
    }

    // SSE 连接启动器状态
    const evtSource = new EventSource('/api/launcher-status');
    evtSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.step) {
        setStep(data.step, data.state, data.detail);
      }
      if (data.error) {
        showError(data.error);
        evtSource.close();
      }
      if (data.done) {
        evtSource.close();
        setTimeout(() => {
          window.location.href = data.url || 'http://localhost:34568';
        }, 500);
      }
    };
    evtSource.onerror = () => {
      // 状态服务不可用，静默失败
    };
  </script>
</body>
</html>
